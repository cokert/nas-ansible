---
- name: Set hostname
  hostname:
    name: "{{ nas_hostname }}"

- name: Ensure /etc/hosts has 127.0.1.1 entry
  lineinfile:
    path: /etc/hosts
    regexp: '^127\.0\.1\.1'
    line: "127.0.1.1 {{ nas_hostname }}"
    state: present

# ----- Tailscale cert -----
- name: Deploy Tailscale cert renewal script
  template:
    src: renew-tailscale-cert.sh.j2
    dest: /usr/local/sbin/renew-tailscale-cert
    owner: root
    group: root
    mode: "0755"

- name: Deploy Tailscale cert renewal service
  copy:
    dest: /etc/systemd/system/tailscale-cert-renewal.service
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=Renew Tailscale TLS certificate
      After=tailscaled.service
      Wants=tailscaled.service

      [Service]
      Type=oneshot
      ExecStart=/usr/local/sbin/renew-tailscale-cert

- name: Deploy Tailscale cert renewal timer
  copy:
    dest: /etc/systemd/system/tailscale-cert-renewal.timer
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=Renew Tailscale TLS certificate weekly

      [Timer]
      OnCalendar=weekly
      Persistent=true

      [Install]
      WantedBy=timers.target
  notify: reload systemd and enable tailscale cert timer

- name: Run Tailscale cert renewal now (initial issuance)
  command: /usr/local/sbin/renew-tailscale-cert
  args:
    creates: /etc/cockpit/ws-certs.d/9-tailscale.cert

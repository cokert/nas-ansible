---
- name: Set hostname
  hostname:
    name: "{{ nas_hostname }}"

- name: Mask openipmi (LSB init script causes Cockpit to spin)
  systemd:
    name: openipmi
    masked: true

- name: Ensure /etc/hosts has 127.0.1.1 entry
  lineinfile:
    path: /etc/hosts
    regexp: '^127\.0\.1\.1'
    line: "127.0.1.1 {{ nas_hostname }}"
    state: present

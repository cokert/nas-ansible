---
- name: Disable AppArmor security driver in libvirt (prevents profile load errors)
  lineinfile:
    path: /etc/libvirt/qemu.conf
    regexp: '^#?\s*security_driver\s*='
    line: 'security_driver = "none"'
    state: present
  notify: Restart libvirtd

- name: Remove netplan-generated NM connection for {{ kvm_bridge_iface }} if present
  community.general.nmcli:
    conn_name: "netplan-{{ kvm_bridge_iface }}"
    state: absent
  register: netplan_conn_removed

- name: Create br0 bridge connection
  community.general.nmcli:
    type: bridge
    conn_name: "{{ kvm_bridge_name }}"
    ifname: "{{ kvm_bridge_name }}"
    stp: false
    method4: auto
    autoconnect: true
    state: present
  register: bridge_conn

- name: Add {{ kvm_bridge_iface }} as br0 slave
  community.general.nmcli:
    type: ethernet
    conn_name: "{{ kvm_bridge_name }}-slave"
    ifname: "{{ kvm_bridge_iface }}"
    master: "{{ kvm_bridge_name }}"
    slave_type: bridge
    autoconnect: true
    state: present
  register: slave_conn

- name: Bring up bridge slave and bridge (async to survive brief network drop)
  shell: |
    nmcli connection up "{{ kvm_bridge_name }}-slave"
    nmcli connection up "{{ kvm_bridge_name }}"
  async: 30
  poll: 0
  when: netplan_conn_removed.changed or bridge_conn.changed or slave_conn.changed

- name: Wait for host to come back after bridge activation
  wait_for_connection:
    delay: 5
    timeout: 60
  when: netplan_conn_removed.changed or bridge_conn.changed or slave_conn.changed

- name: Enable and start cockpit socket
  systemd:
    name: cockpit.socket
    enabled: true
    state: started

- name: Enable and start libvirtd
  systemd:
    name: libvirtd
    enabled: true
    state: started

- name: Define libvirt host-bridge network
  community.libvirt.virt_net:
    name: host-bridge
    state: present
    xml: |
      <network>
        <name>host-bridge</name>
        <forward mode="bridge"/>
        <bridge name="{{ kvm_bridge_name }}"/>
      </network>

- name: Set host-bridge network to autostart
  community.libvirt.virt_net:
    name: host-bridge
    autostart: true

- name: Start host-bridge network
  community.libvirt.virt_net:
    name: host-bridge
    state: active

- name: Set libvirt default network to autostart
  community.libvirt.virt_net:
    name: default
    autostart: true

- name: Start libvirt default network
  community.libvirt.virt_net:
    name: default
    state: active

- name: Define vms storage pool and set autostart
  community.libvirt.virt_pool:
    name: vms
    state: present
    autostart: true
    xml: |
      <pool type='dir'>
        <name>vms</name>
        <target>
          <path>/srv/vms</path>
        </target>
      </pool>

- name: Start vms storage pool
  community.libvirt.virt_pool:
    name: vms
    state: active
